version: '1.0'
states:
- id: intro
  description: Language selection; run action_introduce
- id: main_menu
  description: Menu; run action_main_menu
- id: form_grievance
  description: Collect grievance_new_detail via form loop
- id: done
  description: Form complete; flow ends
transitions:
- from: intro
  intent: set_english
  to: main_menu
  action: action_set_english
- from: intro
  intent: set_nepali
  to: main_menu
  action: action_set_nepali
- from: main_menu
  intent: new_grievance
  to: form_grievance
  action: action_start_grievance_process
- from: form_grievance
  condition: form_complete
  to: done
  action: null
forms:
  form_grievance:
    name: form_grievance
    validation_action: validate_form_grievance
    ask_action: action_ask_grievance_new_detail
    required_slots:
    - grievance_new_detail
