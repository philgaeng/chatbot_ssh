# Alembic configuration for public (chatbot) schema — grievances, complainants, SEAH tables, etc.
# Run from repo root:
#   python -m alembic -c migrations/public/alembic.ini upgrade head
#
# Never mix ticketing DDL here; use ticketing/migrations/alembic.ini for ticketing.* only.

[alembic]
script_location = migrations/public
prepend_sys_path = .
version_path_separator = os

# URL is set in env.py from POSTGRES_* / DB_CONFIG
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
