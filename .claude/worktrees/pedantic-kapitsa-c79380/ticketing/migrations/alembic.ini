# Alembic configuration for GRM Ticketing System
# Run from repo root: alembic -c ticketing/migrations/alembic.ini <command>

[alembic]
script_location = ticketing/migrations
prepend_sys_path = .
version_path_separator = os

# Connection URL set dynamically in env.py — leave blank here
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
