# GRM Ticketing — Docker Compose overlay
#
# ── Demo stack (default — bypass auth, no Keycloak required) ─────────────────
#   make compose_docker_wsl_grm_demo
#   → grm_ui      :3001  BYPASS_AUTH=true  → ticketing_api:5002 (mock super-admin)
#
# ── Auth stack (requires --profile auth) ─────────────────────────────────────
#   make compose_docker_wsl_grm_auth
#   → grm_ui_auth :3002  BYPASS_AUTH=false → ticketing_api_auth:5003 (Keycloak JWT)
#   → keycloak    :18080 admin UI (admin / ${KEYCLOAK_ADMIN_PASSWORD})
#                        Host port configurable via KEYCLOAK_HOST_PORT.
#                        Browser-facing URL pinned by KC_HOSTNAME_URL so tokens'
#                        `iss` claim matches what the UI uses for login.
#
# After first start with auth profile, initialise the GRM realm once:
#   docker compose -f docker-compose.yml -f docker-compose.grm.yml --profile auth \
#     exec ticketing_api_auth python -m ticketing.auth.keycloak_setup
#
# Run alongside the existing stack:
#   docker compose -f docker-compose.yml -f docker-compose.grm.yml up -d
#
# Or standalone (db + redis must already be running on host):
#   docker compose -f docker-compose.grm.yml up -d
#
# One-shot migration:
#   python -m alembic -c ticketing/migrations/alembic.ini upgrade head
#
# One-shot seed:
#   python -m ticketing.seed.mock_tickets

services:

  # ── Keycloak (OIDC identity provider) — auth profile only ───────────────────
  # Included only when: docker compose --profile auth up
  # Admin UI: http://localhost:${KEYCLOAK_HOST_PORT:-18080}/  (admin / KEYCLOAK_ADMIN_PASSWORD)
  # Default host port is 18080 to avoid clashing with nginx on host :8080.
  # Uses existing db container — stores state in the 'keycloak' schema in app_db.
  keycloak:
    profiles: [auth]
    image: quay.io/keycloak/keycloak:26.0.7
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/app_db
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: user
      KC_DB_PASSWORD: password
      KC_HTTP_PORT: "8080"
      KC_HEALTH_ENABLED: "true"
      # Canonical browser-facing URL — bakes into tokens' `iss` claim and the
      # discovery endpoint. Backend reaches Keycloak via Docker DNS instead
      # (see KEYCLOAK_JWKS_URL in ticketing_api_auth).
      #   Pattern A (local direct ports): http://localhost:18080
      #   Pattern B (EC2 nginx subdomain): https://grm-auth.<host>/keycloak
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL:-http://localhost:18080}
      # Path prefix Keycloak expects in incoming requests. Empty = root.
      # Set to /keycloak on EC2 (Pattern B) so KC and nginx agree on the
      # subpath. MUST match the path in KC_HOSTNAME_URL.
      KC_HTTP_RELATIVE_PATH: ${KC_HTTP_RELATIVE_PATH:-/}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_HOST_PORT:-18080}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Keycloak 26 exposes /health/ready on the management port (9000), not 8080.
      # Quarkus management interface starts only when KC_HEALTH_ENABLED=true.
      # KC_HTTP_RELATIVE_PATH (set on the service env) shifts the path prefix —
      # in Pattern A it's "/" (no prefix), in Pattern B "/keycloak". `$$VAR`
      # defers expansion to the container's shell at runtime instead of compose
      # render time. The `%/` strips a trailing slash so Pattern A becomes "".
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET %s/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' \"$${KC_HTTP_RELATIVE_PATH%/}\" >&3 && grep -q '\"status\": \"UP\"' <&3"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  # ── Backend API port override (base docker-compose.yml has no host port mapping) ──
  # This overlay exposes port 5001 so the host browser can reach /api/grievance/*.
  # The ticketing_api service also overrides BACKEND_GRIEVANCE_BASE_URL to use the
  # Docker service name (http://backend:5001) rather than localhost.
  backend:
    ports:
      - "5001:5001"

  # ── Orchestrator port override (same pattern — expose 8000 for local testing) ──
  orchestrator:
    ports:
      - "8000:8000"

  # ── Ticketing API (FastAPI, port 5002) ────────────────────────────────────────
  # network_mode: host → container shares host loopback → can reach localhost:5432 + localhost:6379
  ticketing_api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn ticketing.api.main:app --host 0.0.0.0 --port 5002
    env_file:
      - env.local
    environment:
      TICKETING_PORT: "5002"
      REDIS_PASSWORD: ""
      # Use Docker service names for internal calls (not localhost)
      BACKEND_GRIEVANCE_BASE_URL: http://backend:5001
      ORCHESTRATOR_BASE_URL: http://orchestrator:8000
      # Override to use the Docker db service (user/password/app_db)
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Keycloak (leave empty to keep dev bypass / mock-super-admin)
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ticketing-api}
      KEYCLOAK_ADMIN_URL: ${KEYCLOAK_ADMIN_URL:-}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "5002:5002"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5002/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── GRM Celery worker (SLA watchdog + grievance sync + notifications) ─────────
  grm_celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery
      -A ticketing.tasks.celery_app.celery_app
      worker
      -Q grm_ticketing
      --loglevel=info
      --concurrency=2
      --without-gossip --without-mingle --without-heartbeat
    env_file:
      - env.local
    environment:
      REDIS_PASSWORD: ""
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── GRM Celery Beat (periodic task scheduler) ─────────────────────────────────
  grm_celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery
      -A ticketing.tasks.celery_app.celery_app
      beat
      --loglevel=info
      --schedule /tmp/grm_celerybeat-schedule
    env_file:
      - env.local
    environment:
      REDIS_PASSWORD: ""
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - grm_celery
    restart: unless-stopped

  # ── GRM Ticketing UI — demo build (port 3001, BYPASS_AUTH=true) ──────────────
  # All API calls are proxied server-side via Next.js rewrites (see next.config.ts).
  # Browser only uses port 3001 — no direct access to port 5002 needed.
  # TICKETING_API_URL is a server-side runtime var (not baked into the image).
  grm_ui:
    build:
      context: ./channels/ticketing-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BYPASS_AUTH: ${NEXT_PUBLIC_BYPASS_AUTH:-true}
        NEXT_PUBLIC_OIDC_ISSUER: ${NEXT_PUBLIC_OIDC_ISSUER:-}
        NEXT_PUBLIC_OIDC_CLIENT_ID: ${NEXT_PUBLIC_OIDC_CLIENT_ID:-ticketing-ui}
        NEXT_PUBLIC_REDIRECT_SIGN_IN: ${NEXT_PUBLIC_REDIRECT_SIGN_IN:-}
        NEXT_PUBLIC_REDIRECT_SIGN_OUT: ${NEXT_PUBLIC_REDIRECT_SIGN_OUT:-}
    environment:
      # Server-side proxy target — uses Docker service name (not localhost)
      TICKETING_API_URL: ${TICKETING_API_URL:-http://ticketing_api:5002}
    ports:
      - "3001:3001"
    depends_on:
      - ticketing_api
    restart: unless-stopped

  # ── GRM Ticketing UI — auth build (port 3002, BYPASS_AUTH=false) — auth profile
  # Built with real OIDC config baked in. Proxied at /grm-auth/ via nginx.
  # CURSOR: ensure nginx /grm-auth/ block is uncommented before using.
  # CURSOR: issuer URL note — NEXT_PUBLIC_OIDC_ISSUER must be reachable from the
  # browser. Keycloak is proxied at http://localhost/keycloak/ (WSL) or
  # https://<host>/keycloak/ (AWS) — see nginx conf. Set KC_HOSTNAME_URL to match.
  grm_ui_auth:
    profiles: [auth]
    build:
      context: ./channels/ticketing-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BYPASS_AUTH: "false"
        NEXT_PUBLIC_OIDC_ISSUER: ${NEXT_PUBLIC_OIDC_ISSUER:-http://localhost/keycloak/realms/grm}
        NEXT_PUBLIC_OIDC_CLIENT_ID: ${NEXT_PUBLIC_OIDC_CLIENT_ID:-ticketing-ui}
        NEXT_PUBLIC_REDIRECT_SIGN_IN: ${NEXT_PUBLIC_REDIRECT_SIGN_IN:-}
        NEXT_PUBLIC_REDIRECT_SIGN_OUT: ${NEXT_PUBLIC_REDIRECT_SIGN_OUT:-}
    environment:
      TICKETING_API_URL: ${TICKETING_API_AUTH_URL:-http://ticketing_api_auth:5003}
    ports:
      - "3002:3001"
    depends_on:
      - ticketing_api_auth
    restart: unless-stopped

  # ── Ticketing API — auth instance (port 5003, Keycloak JWT) — auth profile ──
  # Separate instance from ticketing_api so demo (port 5002) stays always-on.
  # CURSOR: issuer URL split —
  #   Browser-facing issuer (baked into tokens' `iss` claim) is the nginx-proxied URL:
  #     http://localhost/keycloak/realms/grm  (WSL)
  #   This container resolves Keycloak by Docker DNS, so use the KC internal URL:
  #     KEYCLOAK_ISSUER: http://keycloak:8080/keycloak/realms/grm
  #   These must match — set KC_HOSTNAME_URL in the keycloak service so Keycloak
  #   issues tokens with iss=http://localhost/keycloak/realms/grm, then update
  #   KEYCLOAK_ISSUER here AND add a hosts entry or split the settings into
  #   KEYCLOAK_ISSUER_CLAIM (for jwt.decode) and KEYCLOAK_JWKS_URL (for fetch).
  ticketing_api_auth:
    profiles: [auth]
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn ticketing.api.main:app --host 0.0.0.0 --port 5003
    env_file:
      - env.local
    environment:
      TICKETING_PORT: "5003"
      REDIS_PASSWORD: ""
      BACKEND_GRIEVANCE_BASE_URL: http://backend:5001
      ORCHESTRATOR_BASE_URL: http://orchestrator:8000
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # `iss` claim validation — must match what the BROWSER sees, i.e. the value
      # of KC_HOSTNAME_URL on the keycloak service plus /realms/grm.
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:18080/realms/grm}
      # JWKS fetched via Docker DNS — backend can't reach host port 18080.
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL:-http://keycloak:8080/realms/grm/protocol/openid-connect/certs}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ticketing-api}
      KEYCLOAK_ADMIN_URL: ${KEYCLOAK_ADMIN_URL:-http://keycloak:8080}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    extra_hosts:
      - "host.docker.internal:host-gateway"  # fallback if issuer uses localhost
    ports:
      - "5003:5003"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      keycloak:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5003/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
