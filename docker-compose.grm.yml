# GRM Ticketing — Docker Compose overlay
#
# Run alongside the existing stack:
#   docker compose -f docker-compose.yml -f docker-compose.grm.yml up -d
#
# Or GRM-only (requires db and redis already running):
#   docker compose -f docker-compose.grm.yml up -d
#
# One-shot migration + seed:
#   docker compose -f docker-compose.yml -f docker-compose.grm.yml \
#     --profile grm-init run --rm grm_migrate
#   docker compose -f docker-compose.yml -f docker-compose.grm.yml \
#     --profile grm-init run --rm grm_seed

services:

  # ── Ticketing API (FastAPI, port 5002) ────────────────────────────────────────
  ticketing_api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      /home/philg/miniconda/envs/chatbot-rest/bin/uvicorn
      ticketing.api.main:app
      --host 0.0.0.0
      --port 5002
    env_file:
      - env.local
    environment:
      TICKETING_PORT: "5002"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "5002:5002"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── GRM Celery worker (SLA watchdog + grievance sync + notifications) ─────────
  grm_celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      /home/philg/miniconda/envs/chatbot-rest/bin/celery
      -A ticketing.tasks.celery_app.celery_app
      worker
      -Q grm_ticketing
      --loglevel=info
      --concurrency=2
      --without-gossip --without-mingle --without-heartbeat
    env_file:
      - env.local
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── GRM Celery Beat (periodic task scheduler) ─────────────────────────────────
  grm_celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      /home/philg/miniconda/envs/chatbot-rest/bin/celery
      -A ticketing.tasks.celery_app.celery_app
      beat
      --loglevel=info
      --schedule /tmp/grm_celerybeat-schedule
    env_file:
      - env.local
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - grm_celery
    restart: unless-stopped

  # ── GRM Ticketing UI (Next.js, port 3001) ─────────────────────────────────────
  grm_ui:
    build:
      context: ./channels/ticketing-ui
      dockerfile: Dockerfile
      args:
        # Public URL of the ticketing API (accessible from browser, not container)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5002}
        NEXT_PUBLIC_BACKEND_API_URL: ${NEXT_PUBLIC_BACKEND_API_URL:-http://localhost:5001}
        NEXT_PUBLIC_BYPASS_AUTH: ${NEXT_PUBLIC_BYPASS_AUTH:-false}
        NEXT_PUBLIC_COGNITO_DOMAIN: ${NEXT_PUBLIC_COGNITO_DOMAIN:-}
        NEXT_PUBLIC_COGNITO_CLIENT_ID: ${NEXT_PUBLIC_COGNITO_CLIENT_ID:-}
        NEXT_PUBLIC_COGNITO_REGION: ${NEXT_PUBLIC_COGNITO_REGION:-ap-southeast-1}
        NEXT_PUBLIC_REDIRECT_SIGN_IN: ${NEXT_PUBLIC_REDIRECT_SIGN_IN:-}
        NEXT_PUBLIC_REDIRECT_SIGN_OUT: ${NEXT_PUBLIC_REDIRECT_SIGN_OUT:-}
    ports:
      - "3001:3001"
    depends_on:
      ticketing_api:
        condition: service_healthy
    restart: unless-stopped

  # ── One-shot: run Alembic migration ──────────────────────────────────────────
  grm_migrate:
    profiles: ["grm-init"]
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      /home/philg/miniconda/envs/chatbot-rest/bin/alembic
      -c ticketing/migrations/alembic.ini
      upgrade head
    env_file:
      - env.local
    depends_on:
      db:
        condition: service_healthy

  # ── One-shot: seed demo data ──────────────────────────────────────────────────
  grm_seed:
    profiles: ["grm-init"]
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      /home/philg/miniconda/envs/chatbot-rest/bin/python3
      -m ticketing.seed.mock_tickets
    env_file:
      - env.local
    depends_on:
      grm_migrate:
        condition: service_completed_successfully
