# GRMS app log rotation (host logrotate).
# Container stdout/stderr is bounded by the json-file driver (compose x-logging);
# this covers file logs written under the repo's logs/ directory.
#
# Install:
#   sudo cp deployment/logrotate/grms.conf /etc/logrotate.d/grms
#   sudo sed -i "s#__REPO__#/opt/grms#g" /etc/logrotate.d/grms   # set actual repo path
#   sudo logrotate -d /etc/logrotate.d/grms                      # dry-run
#
# Then ops.maintenance.prune_logs reports the directory size daily as a backstop.

__REPO__/logs/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    su root root
}
