# Nepal production TLS — mount after certbot issues grm-chatbot.dor.gov.np
# Officer UI + Keycloak on the same hostname (no demo/bypass stack on prod).
server {
    listen 80;
    server_name grm-chatbot.dor.gov.np 103.175.193.233;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name grm-chatbot.dor.gov.np 103.175.193.233;

    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;
    set $orchestrator_host orchestrator;
    set $backend_host backend;
    set $ticketing_api_host ticketing_api;

    # Auth stack (--profile auth): officer UI, JWT API, Keycloak.
    set $grm_ui_auth_host grm_ui_auth;
    set $ticketing_api_auth_host ticketing_api_auth;
    set $keycloak_host keycloak;

    ssl_certificate /etc/letsencrypt/live/grm-chatbot.dor.gov.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grm-chatbot.dor.gov.np/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_prefer_server_ciphers off;

    # Officer attachments, chatbot uploads, location imports (default nginx limit is 1m).
    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect bare HTTPS root to webchat entrypoint.
    location = / {
        return 302 /rest-webchat/;
    }

    location /rest-webchat/ {
        alias /app/channels/REST_webchat/;
        index index.html;
    }

    location /shared/ {
        alias /app/channels/shared/;
        try_files $uri $uri/ =404;
    }

    # Keycloak OIDC (Pattern B path prefix — matches KC_HTTP_RELATIVE_PATH=/keycloak).
    location /keycloak/ {
        proxy_pass http://$keycloak_host:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
    }

    # Next.js static/runtime assets must resolve from the UI upstream.
    location /_next/ {
        proxy_pass http://$grm_ui_auth_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /message {
        proxy_pass http://$orchestrator_host:8000/message;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    location ~* ^/accessible-socket\.io/ {
        proxy_pass http://$backend_host:5001;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location = /accessible-socket.io {
        proxy_pass http://$backend_host:5001/accessible-socket.io;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location /upload-files {
        proxy_pass http://$backend_host:5001/upload-files;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    location /upload-voice-chunk {
        proxy_pass http://$backend_host:5001/upload-voice-chunk;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 2M;
        proxy_read_timeout 120;
        proxy_connect_timeout 60;
        proxy_send_timeout 120;
    }

    location /upload-voice-complete {
        proxy_pass http://$backend_host:5001/upload-voice-complete;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 60;
        proxy_send_timeout 120;
    }

    location /files/ {
        proxy_pass http://$backend_host:5001/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    location ~ ^/file-status/(.+)$ {
        # Preserve file_id explicitly to avoid URI truncation in upstream requests.
        proxy_pass http://$backend_host:5001/file-status/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
        proxy_connect_timeout 10;
        proxy_send_timeout 30;
    }

    location /task-status/ {
        proxy_pass http://$backend_host:5001/task-status/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gsheet-get-grievances {
        proxy_pass http://$backend_host:5001/gsheet-get-grievances;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
    }

    # GRM Ticketing API calls from the browser (absolute /api/v1/... paths).
    location /api/v1/ {
        proxy_pass http://$grm_ui_auth_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    # Direct mobile routes from Next.js (e.g., /m, /m/queue, /m/tickets/*).
    # Handle both /m and /m/... directly to avoid /m <-> /m/ redirect loops.
    location = /m {
        proxy_pass http://$grm_ui_auth_host:3001/m;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /m/ {
        proxy_pass http://$grm_ui_auth_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Mobile UA redirect for the UI entrypoints only.
    # Keep APIs untouched and allow explicit desktop override via ?view=desktop.
    location = /grm/ {
        if ($arg_view = desktop) {
            return 302 /grm/;
        }
        if ($http_user_agent ~* "(android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile)") {
            return 302 /grm/m/;
        }
        rewrite ^/grm/?(.*)$ /$1 break;
        proxy_pass http://$grm_ui_auth_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /ticketing/ {
        if ($arg_view = desktop) {
            return 302 /ticketing/;
        }
        if ($http_user_agent ~* "(android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile)") {
            return 302 /ticketing/m/;
        }
        rewrite ^/ticketing/?(.*)$ /$1 break;
        proxy_pass http://$grm_ui_auth_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # GRM Ticketing UI — all sub-paths.
    location /grm/ {
        rewrite ^/grm/?(.*)$ /$1 break;
        proxy_pass http://$grm_ui_auth_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Ticketing UI (alias path) exposed on :3001 upstream
    location /ticketing/ {
        rewrite ^/ticketing/?(.*)$ /$1 break;
        proxy_pass http://$grm_ui_auth_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Root-level officer UI routes (explicit list for prefix matching).
    location ~ ^/(queue|tickets|escalated|reports|settings|help|login|auth|qr-codes|account|closure)(/.*)?$ {
        proxy_pass http://$grm_ui_auth_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # GRM Ticketing API served under /grm-api/
    location /grm-api/ {
        rewrite ^/grm-api/?(.*)$ /$1 break;
        proxy_pass http://$ticketing_api_auth_host:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 20M;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    # Ticketing mobile/API alias path exposed on :5001 upstream
    location /ticketing-mobile/ {
        rewrite ^/ticketing-mobile/?(.*)$ /$1 break;
        proxy_pass http://$backend_host:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Officer UI catch-all — same pattern as grm-auth subdomain on staging.
    # Serves routes not listed above (e.g. future Next.js pages) via grm_ui_auth.
    location / {
        proxy_pass http://$grm_ui_auth_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
}
