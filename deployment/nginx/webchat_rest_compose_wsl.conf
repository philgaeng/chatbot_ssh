# WSL / local Compose — HTTP only.
# Use Docker embedded DNS + variable proxy_pass so upstream IPs refresh when
# orchestrator/backend containers are recreated without restarting nginx.

server {
    listen 80;
    server_name localhost 127.0.0.1;

    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;
    set $orchestrator_host orchestrator;
    set $backend_host backend;
    set $grm_ui_host grm_ui;
    set $ticketing_api_host ticketing_api;

    # ── Auth profile upstreams (used only when --profile auth is active) ──────
    # CURSOR: these variables must always be declared even when the auth profile
    # is not running, otherwise nginx fails to start. If grm_ui_auth / keycloak
    # containers are absent the proxy_pass will return 502 for those routes,
    # which is fine — the demo routes on port 3001/5002 remain unaffected.
    set $grm_ui_auth_host grm_ui_auth;
    set $ticketing_api_auth_host ticketing_api_auth;
    set $keycloak_host keycloak;

    location /health {
        proxy_pass http://$orchestrator_host:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rest-webchat/ {
        alias /app/channels/REST_webchat/;
        index index.html;
    }

    location /shared/ {
        alias /app/channels/shared/;
        try_files $uri $uri/ =404;
    }

    location /message {
        proxy_pass http://$orchestrator_host:8000/message;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    location ~* ^/accessible-socket\.io/ {
        proxy_pass http://$backend_host:5001;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location = /accessible-socket.io {
        proxy_pass http://$backend_host:5001/accessible-socket.io;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location /upload-files {
        proxy_pass http://$backend_host:5001/upload-files;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    location /files/ {
        proxy_pass http://$backend_host:5001/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    location ~ ^/file-status/(.+)$ {
        # Preserve file_id explicitly to avoid URI truncation in upstream requests.
        proxy_pass http://$backend_host:5001/file-status/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
        proxy_connect_timeout 10;
        proxy_send_timeout 30;
    }

    location /task-status/ {
        proxy_pass http://$backend_host:5001/task-status/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gsheet-get-grievances {
        proxy_pass http://$backend_host:5001/gsheet-get-grievances;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
    }

    # Catch-all → GRM Ticketing UI.
    # Next.js Link components generate absolute paths (/m/..., /queue, /tickets/...)
    # without the /grm/ prefix. nginx falls through to here for anything not matched
    # by a more specific block (chatbot routes, /_next/, /grm/, /api/v1/, etc.).
    # This means the GRM app is reachable at both /grm/m/queue AND /m/queue — fine for demo.
    # CURSOR note: on AWS the catch-all should redirect non-/grm/ paths to /grm/ instead.
    location / {
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # GRM Ticketing API calls from the browser.
    # Next.js serves the UI on :3001 and has an internal proxy route at
    # /api/v1/[...path] that forwards to ticketing_api:5002.
    # Browser-side fetches use /api/v1/... absolute paths, so nginx must
    # route them back to grm_ui:3001 (not directly to ticketing_api).
    location /api/v1/ {
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static assets — must be proxied before the /grm/ catch-all so the
    # browser can fetch /_next/static/... chunks regardless of which page loaded them.
    location /_next/ {
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # GRM Ticketing UI — exact root: mobile-UA redirect, desktop bypass override.
    location = /grm/ {
        if ($arg_view = desktop) {
            rewrite ^/grm/?(.*)$ /$1 break;
            proxy_pass http://$grm_ui_host:3001;
        }
        if ($http_user_agent ~* "(android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile)") {
            return 302 /grm/m/queue;
        }
        rewrite ^/grm/?(.*)$ /$1 break;
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # GRM Ticketing UI — all sub-paths (desktop and /m/* mobile routes).
    location /grm/ {
        rewrite ^/grm/?(.*)$ /$1 break;
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # GRM Ticketing API served under /grm-api/
    location /grm-api/ {
        rewrite ^/grm-api/?(.*)$ /$1 break;
        proxy_pass http://$ticketing_api_host:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Keycloak OIDC server — auth profile only ──────────────────────────────
    # CURSOR: Uncomment this block when --profile auth is active.
    # Proxies Keycloak so it is reachable at /keycloak/ through port 80.
    # This lets the browser reach Keycloak on the same origin/port as the UI,
    # which avoids mixed-content issues on HTTPS and simplifies CORS.
    #
    # Required env in docker-compose.grm.yml keycloak service:
    #   KC_HOSTNAME_URL: http://localhost/keycloak      (WSL) or https://grm.stage.../keycloak (AWS)
    #   KC_HTTP_RELATIVE_PATH: /keycloak
    # Required frontend build arg:
    #   NEXT_PUBLIC_OIDC_ISSUER: http://localhost/keycloak/realms/grm
    # Required ticketing_api_auth env:
    #   KEYCLOAK_ISSUER: http://keycloak:8080/keycloak/realms/grm   (Docker-internal DNS)
    #
    # location /keycloak/ {
    #     proxy_pass http://$keycloak_host:8080/keycloak/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_buffer_size 64k;
    #     proxy_buffers 8 64k;
    # }

    # ── GRM Ticketing UI — Keycloak auth build (auth profile only) ───────────
    # CURSOR: Uncomment when --profile auth is active (grm_ui_auth on port 3002).
    # Serves the Next.js build compiled with BYPASS_AUTH=false at /grm-auth/.
    #
    # Note on /_next/ asset routing: Next.js emits asset URLs as /_next/static/…
    # regardless of basePath. Both grm_ui (demo) and grm_ui_auth serve their own
    # /_next/ assets. nginx currently routes /_next/ to grm_ui only (see below).
    # CURSOR: add a dedicated location /_next-auth/ or set basePath=/grm-auth
    # in channels/ticketing-ui/next.config.ts for the auth build to avoid chunk
    # collisions between the two UI instances.
    #
    # location /grm-auth/ {
    #     rewrite ^/grm-auth/?(.*)$ /$1 break;
    #     proxy_pass http://$grm_ui_auth_host:3001;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    # ── GRM Ticketing API — Keycloak auth instance (auth profile only) ───────
    # CURSOR: Uncomment when --profile auth is active (ticketing_api_auth on port 5003).
    #
    # location /grm-auth-api/ {
    #     rewrite ^/grm-auth-api/?(.*)$ /$1 break;
    #     proxy_pass http://$ticketing_api_auth_host:5003;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
}
