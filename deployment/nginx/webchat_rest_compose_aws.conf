# AWS Compose — HTTP redirect + HTTPS. Same DNS re-resolution pattern as WSL compose.

server {
    listen 80;
    # Replace/add hostnames for your deployment.
    server_name nepal-gms-chatbot.facets-ai.com 52.76.171.73 localhost 127.0.0.1;

    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;
    set $orchestrator_host orchestrator;
    set $grm_ui_host grm_ui;
    set $ticketing_api_host ticketing_api;

    # ACME challenge path used by certbot renew --webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        proxy_pass http://$orchestrator_host:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect all HTTP traffic to HTTPS once certs are in place.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name nepal-gms-chatbot.facets-ai.com 52.76.171.73 localhost 127.0.0.1;

    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;
    set $orchestrator_host orchestrator;
    set $backend_host backend;
    set $grm_ui_host grm_ui;
    set $ticketing_api_host ticketing_api;

    # ── Auth profile upstreams (always declared; 502 if containers absent) ───
    # CURSOR: see webchat_rest_compose_wsl.conf for full explanation.
    set $grm_ui_auth_host grm_ui_auth;
    set $ticketing_api_auth_host ticketing_api_auth;
    set $keycloak_host keycloak;

    ssl_certificate /etc/letsencrypt/live/nepal-gms-chatbot.facets-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nepal-gms-chatbot.facets-ai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_prefer_server_ciphers off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect bare HTTPS root to webchat entrypoint.
    location = / {
        return 302 /rest-webchat/;
    }

    location /rest-webchat/ {
        alias /app/channels/REST_webchat/;
        index index.html;
    }

    location /shared/ {
        alias /app/channels/shared/;
        try_files $uri $uri/ =404;
    }

    # Next.js static/runtime assets must resolve from the UI upstream.
    location /_next/ {
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /message {
        proxy_pass http://$orchestrator_host:8000/message;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    location ~* ^/accessible-socket\.io/ {
        proxy_pass http://$backend_host:5001;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location = /accessible-socket.io {
        proxy_pass http://$backend_host:5001/accessible-socket.io;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location /upload-files {
        proxy_pass http://$backend_host:5001/upload-files;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    location /files/ {
        proxy_pass http://$backend_host:5001/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    location /file-status/ {
        proxy_pass http://$backend_host:5001/file-status/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
        proxy_connect_timeout 10;
        proxy_send_timeout 30;
    }

    location /task-status/ {
        proxy_pass http://$backend_host:5001/task-status/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gsheet-get-grievances {
        proxy_pass http://$backend_host:5001/gsheet-get-grievances;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
    }

    # GRM Ticketing API calls from the browser (absolute /api/v1/... paths).
    location /api/v1/ {
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct mobile routes from Next.js (e.g., /m, /m/queue, /m/tickets/*).
    # Handle both /m and /m/... directly to avoid /m <-> /m/ redirect loops.
    location = /m {
        proxy_pass http://$grm_ui_host:3001/m;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /m/ {
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Mobile UA redirect for the UI entrypoints only.
    # Keep APIs untouched and allow explicit desktop override via ?view=desktop.
    location = /grm/ {
        if ($arg_view = desktop) {
            return 302 /grm/;
        }
        if ($http_user_agent ~* "(android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile)") {
            return 302 /grm/m/;
        }
        rewrite ^/grm/?(.*)$ /$1 break;
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /ticketing/ {
        if ($arg_view = desktop) {
            return 302 /ticketing/;
        }
        if ($http_user_agent ~* "(android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile)") {
            return 302 /ticketing/m/;
        }
        rewrite ^/ticketing/?(.*)$ /$1 break;
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # GRM Ticketing UI — all sub-paths.
    location /grm/ {
        rewrite ^/grm/?(.*)$ /$1 break;
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Ticketing UI (alias path) exposed on :3001 upstream
    location /ticketing/ {
        rewrite ^/ticketing/?(.*)$ /$1 break;
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Root-level ticketing routes (app redirects may land here).
    location ~ ^/(queue|tickets|escalated|reports|settings|help|login|auth)(/.*)?$ {
        proxy_pass http://$grm_ui_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # GRM Ticketing API served under /grm-api/
    location /grm-api/ {
        rewrite ^/grm-api/?(.*)$ /$1 break;
        proxy_pass http://$ticketing_api_host:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Ticketing mobile/API alias path exposed on :5001 upstream
    location /ticketing-mobile/ {
        rewrite ^/ticketing-mobile/?(.*)$ /$1 break;
        proxy_pass http://$backend_host:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # NOTE: Keycloak + auth UI are served from a dedicated subdomain
    # (grm-auth.nepal-gms-chatbot.facets-ai.com) — see the server blocks
    # at the bottom of this file. Subdomain isolation avoids Next.js
    # basePath surgery and asset/path collisions with the demo UI.

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
}

# ─────────────────────────────────────────────────────────────────────────────
# GRM Auth subdomain — Keycloak + authenticated officer UI
# ─────────────────────────────────────────────────────────────────────────────
# Activated only when the --profile auth Compose stack is running. If the
# auth containers (grm_ui_auth, ticketing_api_auth, keycloak) are absent,
# nginx returns 502 for these blocks — does NOT break the main hostname.
#
# Cert: must include this SAN. Extend the existing cert with:
#   sudo certbot --expand \
#     -d nepal-gms-chatbot.facets-ai.com \
#     -d grm-auth.nepal-gms-chatbot.facets-ai.com
# Same /etc/letsencrypt/live/nepal-gms-chatbot.facets-ai.com/ path is reused.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name grm-auth.nepal-gms-chatbot.facets-ai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name grm-auth.nepal-gms-chatbot.facets-ai.com;

    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;
    set $grm_ui_auth_host grm_ui_auth;
    set $ticketing_api_auth_host ticketing_api_auth;
    set $keycloak_host keycloak;

    # Same cert as the main hostname after `certbot --expand`.
    ssl_certificate /etc/letsencrypt/live/nepal-gms-chatbot.facets-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nepal-gms-chatbot.facets-ai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_prefer_server_ciphers off;

    # Keycloak — served at /keycloak/* on this subdomain. KC must run with
    # KC_HTTP_RELATIVE_PATH=/keycloak so it expects the prefix in incoming
    # requests, and KC_HOSTNAME=https://grm-auth.nepal-gms-chatbot.facets-ai.com/keycloak
    # so issued tokens carry a matching `iss`. KC_PROXY_HEADERS=xforwarded
    # makes KC honor the X-Forwarded-Proto header below for HTTPS scheme.
    location /keycloak/ {
        proxy_pass http://$keycloak_host:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
    }

    # Auth UI's Next.js → ticketing_api_auth proxy. MUST NOT forward the
    # `Connection: upgrade` header that the catch-all `/` block sets below,
    # because Next.js's undici fetch rejects forwarding hop-by-hop headers
    # (UND_ERR_INVALID_ARG: "invalid connection header") and every API call
    # then 500s.
    location /api/v1/ {
        proxy_pass http://$grm_ui_auth_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → the auth Next.js app (which serves its own /_next/,
    # /auth/callback, /queue, /settings, etc.). Connection/Upgrade kept
    # for any future WebSocket/HMR/SSE traffic on the UI side.
    location / {
        proxy_pass http://$grm_ui_auth_host:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
}
