services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend.orchestrator.main:app --host 0.0.0.0 --port 8000
    env_file:
      - env.local
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql://user:password@db:5432/app_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend.api.fastapi_app:app --host 0.0.0.0 --port 5001
    env_file:
      - env.local
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SOCKETIO_REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://user:password@db:5432/app_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

  # One-shot: create schema in empty Postgres volume. Run:
  #   docker compose --profile init run --rm db_init
  db_init:
    profiles: ["init"]
    build:
      context: .
      dockerfile: Dockerfile
    command: ["bash", "/app/scripts/docker/init_db.sh"]
    env_file:
      - env.local
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy

  celery_default:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.task_queue.celery_app worker -Q default --loglevel=info --concurrency=2 --without-gossip --without-mingle --without-heartbeat
    env_file:
      - env.local
    environment:
      # Celery -> FastAPI POST /task-status (same env name as FLASK_URL for backward compatibility)
      FLASK_URL: http://backend:5001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql://user:password@db:5432/app_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

  celery_llm:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.task_queue.celery_app worker -Q llm_queue --loglevel=info --concurrency=6 --without-gossip --without-mingle --without-heartbeat
    env_file:
      - env.local
    environment:
      FLASK_URL: http://backend:5001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql://user:password@db:5432/app_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/webchat_rest_compose_wsl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./channels/REST_webchat:/app/channels/REST_webchat:ro
      - ./channels/shared:/app/channels/shared:ro
    depends_on:
      orchestrator:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:

