# Bounded container logs — prevents the json-file driver from filling the 8 GiB
# host disk (docs/services/12_security_monitoring_service.md §3 item 7).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend.orchestrator.main:app --host 0.0.0.0 --port 8000
    env_file:
      - env.local
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
      DATABASE_URL: postgresql://user:password@db:5432/app_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend.api.fastapi_app:app --host 0.0.0.0 --port 5001
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - env.local
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
      SOCKETIO_REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      DATABASE_URL: postgresql://user:password@db:5432/app_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # One-shot: create schema in empty Postgres volume. Run:
  #   docker compose --profile init run --rm db_init
  db_init:
    profiles: ["init"]
    build:
      context: .
      dockerfile: Dockerfile
    command: ["bash", "/app/scripts/docker/init_db.sh"]
    env_file:
      - env.local
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy

  celery_file:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.task_queue.celery_app worker -Q file_queue --loglevel=info --concurrency=1 --without-gossip --without-mingle --without-heartbeat
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - env.local
    environment:
      FLASK_URL: http://backend:5001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
      DATABASE_URL: postgresql://user:password@db:5432/app_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.task_queue.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 40s

  celery_default:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.task_queue.celery_app worker -Q default --loglevel=info --concurrency=2 --without-gossip --without-mingle --without-heartbeat
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - env.local
    environment:
      # Celery -> FastAPI POST /task-status (same env name as FLASK_URL for backward compatibility)
      FLASK_URL: http://backend:5001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
      DATABASE_URL: postgresql://user:password@db:5432/app_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.task_queue.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 40s

  celery_llm:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.task_queue.celery_app worker -Q llm_queue --loglevel=info --concurrency=6 --without-gossip --without-mingle --without-heartbeat
    env_file:
      - env.local
    environment:
      FLASK_URL: http://backend:5001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
      DATABASE_URL: postgresql://user:password@db:5432/app_db
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.task_queue.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7
    # requirepass is enabled only when REDIS_PASSWORD is non-empty (prod); empty
    # (dev default) starts plain redis so existing WSL flows keep working.
    command: ["sh", "-c", "exec redis-server $${REDIS_PASSWORD:+--requirepass \"$$REDIS_PASSWORD\"}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a \"$$REDIS_PASSWORD\"} ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  nginx:
    image: nginx:stable
    ports:
      # Host :80 is often taken by another stack; use 8080 for local REST webchat.
      - "8080:80"
    # Mount as a named conf file (not default.conf) — Docker Desktop WSL can cache a
    # stale directory at the default.conf bind target if the source was missing once.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - rm -f /etc/nginx/conf.d/default.conf && exec /docker-entrypoint.sh nginx -g 'daemon off;'
    volumes:
      - ./deployment/nginx/webchat_rest_compose_wsl.conf:/etc/nginx/conf.d/webchat_rest_compose_wsl.conf:ro
      - ./channels/REST_webchat:/app/channels/REST_webchat:ro
      - ./channels/shared:/app/channels/shared:ro
    depends_on:
      orchestrator:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "service nginx status >/dev/null 2>&1 || (nginx -t 2>/dev/null && pgrep nginx) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  uploads_data:
  backups_data:

